spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/aggregator_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
    consumer:
      group-id: aggregator-group
